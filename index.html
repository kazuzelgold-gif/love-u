<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For U ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .text-main {
            position: absolute;
            top: 25%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 2px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .sun {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: #dc2626;
            border-radius: 50%;
            box-shadow: 0 0 30px #dc2626, 0 0 60px #dc262680;
            z-index: 5;
        }

        .photo-line {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 8;
        }
        .photo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite alternate;
            opacity: 0.9;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(-2deg); }
            100% { transform: translateY(-15px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <div class="stars" id="starsContainer"></div>

    <!-- ✅ NAMA UDAH DIGANTI JADI SITI ANIDAH ZIKRA ✅ -->
    <div class="text-main">Only For U, <span>Siti Anidah Zikra</span></div>

    <div class="sun"></div>

    <!-- ✅ FOTO KAMU SEMUA UDAH MASUK ✅ -->
    <div class="photo-line">
        <div class="photo" style="background-image: url('https://i.ibb.co/7YhL9yX/1.jpg'); animation-delay: 0s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/2qgHd2b/2.jpg'); animation-delay: 0.2s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/3sLgqLk/3.jpg'); animation-delay: 0.4s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/5T3jG4v/4.jpg'); animation-delay: 0.6s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/7YhL9yX/1.jpg'); animation-delay: 0.8s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/2qgHd2b/2.jpg'); animation-delay: 1s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/3sLgqLk/3.jpg'); animation-delay: 1.2s"></div>
        <div class="photo" style="background-image: url('https://i.ibb.co/5T3jG4v/4.jpg'); animation-delay: 1.4s"></div>
    </div>

    <script>
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>

</body>
</html>
