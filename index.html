<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For U ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Bintang berkedip */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Teks utama */
        .text-main {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 2px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            opacity: 0;
            animation: muncul 2s forwards;
            animation-delay: 0.5s;
        }

        /* Matahari/bulan merah */
        .sun {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: #dc2626;
            border-radius: 50%;
            box-shadow: 0 0 30px #dc2626, 0 0 60px #dc262680;
            z-index: 5;
            opacity: 0;
            animation: muncul 2s forwards;
            animation-delay: 1s;
        }

        /* Wadah lingkaran putar */
        .circle-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            z-index: 8;
            opacity: 0;
            animation: muncul 2s forwards;
            animation-delay: 1.5s;
        }

        /* Lingkaran tempat foto muter */
        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: putar 15s linear infinite;
        }

        /* Foto-foto */
        .photo {
            position: absolute;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            transform-origin: center 200px; /* Titik poros putar */
            opacity: 0;
            animation: fotoMuncul 0.5s forwards;
        }

        /* Animasi */
        @keyframes muncul {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        @keyframes putar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fotoMuncul {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Bintang latar -->
    <div class="stars" id="starsContainer"></div>

    <!-- Teks Utama -->
    <div class="text-main">Only For U, <span>Siti Anidah Zikra</span></div>

    <!-- Matahari Merah -->
    <div class="sun"></div>

    <!-- Wadah Lingkaran Putar -->
    <div class="circle-wrapper">
        <div class="circle" id="circlePhotos">
            <!-- Foto akan dimasukkan pakai JS biar rapi -->
        </div>
    </div>

    <script>
        // Bikin bintang acak
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Link foto kamu
        const fotoList = [
            'https://i.ibb.co/7YhL9yX/1.jpg',
            'https://i.ibb.co/2qgHd2b/2.jpg',
            'https://i.ibb.co/3sLgqLk/3.jpg',
            'https://i.ibb.co/5T3jG4v/4.jpg',
            'https://i.ibb.co/7YhL9yX/1.jpg',
            'https://i.ibb.co/2qgHd2b/2.jpg',
            'https://i.ibb.co/3sLgqLk/3.jpg',
            'https://i.ibb.co/5T3jG4v/4.jpg'
        ];

        const circle = document.getElementById('circlePhotos');
        const jumlahFoto = fotoList.length;

        // Taruh foto melingkar
        fotoList.forEach((link, index) => {
            const photo = document.createElement('div');
            photo.classList.add('photo');
            photo.style.backgroundImage = `url('${link}')`;
            
            // Hitung posisi sudut biar melingkar rata
            const sudut = (index * 360) / jumlahFoto;
            photo.style.transform = `rotate(${sudut}deg) translateY(-200px)`;
            photo.style.animationDelay = `${index * 0.2}s`; // Muncul satu-satu

            circle.appendChild(photo);
        });
    </script>

</body>
</html>
